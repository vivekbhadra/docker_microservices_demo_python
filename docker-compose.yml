services:

  data-service:
    build: ./data-service
    container_name: data-service
    environment:
      - SERVICE_NAME=data-service
      - PORT=5001
    # Not exposed to host — internal only
    networks:
      - microservices-net
    restart: unless-stopped

  api-service:
    build: ./api-service
    container_name: api-service
    ports:
      - "5000:5000"
    environment:
      - SERVICE_NAME=api-service
      - PORT=5000
      - DATA_SERVICE_URL=http://data-service:5001
    depends_on:
      - data-service
    networks:
      - microservices-net
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge
